<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oblékání panenky</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { margin:0; padding:0; height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: linear-gradient(160deg,#ffe8f4 0%,#fff3e0 100%);
  display:flex; flex-direction:column; height:100dvh;
  touch-action: manipulation;
}

/* ── STAGE ── */
.stage {
  flex:1 1 auto; min-height:0;
  display:flex; align-items:center; justify-content:center;
  padding:6px;
}
.stage-inner {
  display:flex; align-items:center; justify-content:center;
  width:100%; height:100%;
}
/* doll-wrap: logická velikost = scaled rozměry (nastavuje JS fitDoll) */
.doll-wrap {
  position:relative; flex-shrink:0;
  filter: drop-shadow(0 8px 24px rgba(180,60,120,.20));
}
/* doll-canvas: vždy 300×620 — škáluje se transformem z fitDoll */
#doll-canvas {
  width:300px; height:620px;
  position:relative;
  transform-origin: top left;
  overflow:visible;
}
.layer {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:block;
  pointer-events:none;
}
/* PNG layers */
img.layer { object-fit:fill; }
/* SVG layers */
svg.layer { overflow:visible; }

/* ── CONTROLS ── */
.controls {
  flex:0 0 auto;
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(12px);
  border-top:3px solid #ffb6d1;
  padding:8px 12px 14px;
  display:flex; flex-direction:column; gap:7px;
  max-height:52%; overflow-y:auto;
}
.row { display:flex; align-items:center; gap:8px; }
.lbl { font-weight:800; font-size:12px; letter-spacing:.06em; width:52px; flex-shrink:0; color:#b03a7c; }
.picker { background:#fff0f6; border-radius:14px; padding:5px 6px; flex:1; }
.arrow {
  width:46px; height:46px; border:none; border-radius:12px;
  background:#ff9bc4; color:#fff; font-size:22px; font-weight:bold;
  cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 #d56fa0;
}
.arrow:active { transform:translateY(2px); box-shadow:none; }
.pname { flex:1; text-align:center; font-weight:800; font-size:13px; letter-spacing:.04em; }
.swatches { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.swatch {
  width:34px; height:34px; border-radius:50%;
  border:3px solid #fff; box-shadow:0 2px 5px rgba(0,0,0,.18);
  cursor:pointer; flex-shrink:0; transition:transform .12s;
}
.swatch.on { border-color:#ff3a8a; transform:scale(1.2); box-shadow:0 2px 10px rgba(255,58,138,.5); }
.save {
  width:100%; padding:13px; border:none; border-radius:16px;
  background:linear-gradient(135deg,#ff6fa3,#ff3a8a);
  color:#fff; font-size:17px; font-weight:800; letter-spacing:.06em;
  cursor:pointer; box-shadow:0 3px 0 #c2206b; margin-top:2px;
}
.save:active { transform:translateY(2px); box-shadow:none; }
</style>
</head>
<body>
<a href="../" style="position:fixed;top:12px;left:14px;z-index:99;color:#c06090;font-size:12px;font-weight:800;text-decoration:none;letter-spacing:.04em;opacity:.7">← HRY</a>

<div class="stage">
<div class="stage-inner">
<div class="doll-wrap" id="doll-wrap">
<div id="doll-canvas">
  <!--
    LAYER ORDER (bottom → top):
    1. hair-back  (PNG, grayscale, CSS-tinted)
    2. body       (SVG, torso/arms/legs — behind outfit)
    3. shoes      (PNG, pod outfitem — špičky vykouknou zpod sukně)
    4. outfit     (PNG, full-color)
    5. face       (SVG, vždy nad outfitem — nos/ústa vždy viditelné)
    6. hair-front (PNG, grayscale, CSS-tinted)
    7. acc        (SVG, crowns, hats…)
  -->

  <!-- 1 – HAIR BACK -->
  <img id="l-hair-back" class="layer" src="" alt=""/>

  <!-- 2 – BODY (torso, arms, legs — no face) -->
  <svg id="l-body-svg" class="layer" viewBox="0 0 300 620" xmlns="http://www.w3.org/2000/svg">
    <defs id="svg-defs"></defs>
    <g id="g-body"></g>
  </svg>

  <!-- 3 – SHOES -->
  <img id="l-shoes" class="layer" src="" alt=""/>

  <!-- 4 – OUTFIT -->
  <img id="l-outfit" class="layer" src="" alt=""/>

  <!-- 5 – FACE (above outfit) -->
  <svg id="l-face-svg" class="layer" viewBox="0 0 300 620" xmlns="http://www.w3.org/2000/svg">
    <defs id="svg-face-defs"></defs>
    <g id="g-face"></g>
  </svg>

  <!-- 6 – HAIR FRONT -->
  <img id="l-hair-front" class="layer" src="" alt=""/>

  <!-- 7 – ACCESSORIES (SVG overlay: crowns, hats, clown nose…) -->
  <svg id="l-acc-svg" class="layer" viewBox="0 0 300 620" xmlns="http://www.w3.org/2000/svg">
    <g id="g-acc"></g>
  </svg>
</div>
</div>
</div>
</div>

<div class="controls">
  <div class="row"><div class="lbl">KŮŽE</div><div class="swatches" id="sw-skin"></div></div>
  <div class="row"><div class="lbl">OČI</div><div class="swatches" id="sw-eye"></div></div>
  <div class="row"><div class="lbl">VLASY</div><div class="swatches" id="sw-hair"></div></div>
  <div class="row"><div class="lbl">ÚČES</div>
    <div class="picker"><div style="display:flex;align-items:center;gap:5px">
      <button class="arrow" id="hs-p">◀</button>
      <div class="pname" id="n-hs"></div>
      <button class="arrow" id="hs-n">▶</button>
    </div></div></div>
  <div class="row"><div class="lbl">ŠATY</div>
    <div class="picker"><div style="display:flex;align-items:center;gap:5px">
      <button class="arrow" id="ot-p">◀</button>
      <div class="pname" id="n-ot"></div>
      <button class="arrow" id="ot-n">▶</button>
    </div></div></div>
  <div class="row"><div class="lbl">BOTY</div>
    <div class="picker"><div style="display:flex;align-items:center;gap:5px">
      <button class="arrow" id="sh-p">◀</button>
      <div class="pname" id="n-sh"></div>
      <button class="arrow" id="sh-n">▶</button>
    </div></div></div>
  <button class="save" id="save">💾 ULOŽIT OBRÁZEK</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  LAYOUT — uprav tady pozice a velikosti jednotlivých vrstev
//  tx    = posun vlevo/vpravo (px, v 300×620 souřadnicích)
//  ty    = posun nahoru (záporné) / dolů (kladné) v px
//  scale = velikost vrstvy (1.0 = plná, 0.5 = polovina)
//  origin: kotva pro scale ("center top" / "center bottom" / "center center")
// ═══════════════════════════════════════════════════════════
const LAYOUT = {
  hairBack:  { tx:  0, ty:   -20, scale: 0.7, origin: 'center top'    }, // vlasy za hlavou
  body:      { tx:  0, ty:   0, scale: 1.0, origin: 'center top'    }, // tělo (ruce, nohy)
  shoes:     { tx:  0, ty:   0, scale: 0.5, origin: 'center bottom' }, // boty
  outfit:    { tx:  0, ty:   0, scale: 1.0, origin: 'center top'    }, // šaty
  head:      { tx:  0, ty:   -20, scale: 0.7, origin: 'center top'    }, // celá hlava (ovál + obličej + krk + uši)
  hairFront: { tx:  0, ty:   -20, scale: 0.7, origin: 'center top'    }, // vlasy před obličejem
};

// ─── COLOR UTILS ──────────────────────────────────────────
const h2r = h=>{const x=h.replace('#','');return[parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)];};
const r2h = (r,g,b)=>'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
const lt = (h,t)=>{const[r,g,b]=h2r(h);return r2h(r+(255-r)*t,g+(255-g)*t,b+(255-b)*t);};
const dk = (h,t)=>{const[r,g,b]=h2r(h);return r2h(r*(1-t),g*(1-t),b*(1-t));};

// ─── PALETTES ─────────────────────────────────────────────
const SKINS=[
  {n:'Světlá',    f:'#fde0c8',s:'#d4a87c'},
  {n:'Jemná',     f:'#f7cfaa',s:'#c89364'},

  {n:'Olivová',   f:'#c89060',s:'#906030'},
  {n:'Tmavá',     f:'#8b5a32',s:'#5a3010'},

// The pipeline: sepia(1) converts gray→warm-brown, then hue-rotate+saturate shifts to desired color

      <path d="M 174 65 L 163 52 L 163 78 L 174 73 Z M 200 65 L 218 52 L 218 78 L 200 73 Z M 174 65 C 188 58 200 65 200 65 C 200 73 188 80 174 73 Z" fill="#ff3a8a"/>

];

// ─── SHOES MANIFEST ───────────────────────────────────────
const SH=[
  {id:'00-barefoot',    name:'Bosky (žádné)'},
  {id:'01-sneakers',    name:'Tenisky'},
  {id:'02-heels',       name:'Lodičky'},
  {id:'03-ballet-flat', name:'Balerínky'},

  {id:'12-flippers',    name:'Ploutve'},
  {id:'13-snowshoes',   name:'Sněžnice'},
  {id:'14-cleats',      name:'Kopačky'},

  {id:'16-paw-slippers',name:'Tlapky zvířátka'},
];

// ─── STATE ────────────────────────────────────────────────
const st={skin:1,eyes:0,hair:4,hs:0,ot:5,sh:1};

// ─── SVG DEFS ─────────────────────────────────────────────
function buildBodyDefs(sk){
  const f=sk.f;
  return `
  <radialGradient id="gFace" cx="42%" cy="35%" r="62%">
    <stop offset="0%"  stop-color="${lt(f,.30)}"/>
    <stop offset="55%" stop-color="${f}"/>
    <stop offset="100%" stop-color="${dk(f,.18)}"/>
  </radialGradient>
  <linearGradient id="gLegL" x1="0" y1=".5" x2="1" y2=".5">
    <stop offset="0%"  stop-color="${dk(f,.12)}"/><stop offset="38%" stop-color="${lt(f,.14)}"/>
    <stop offset="100%" stop-color="${dk(f,.22)}"/>
  </linearGradient>
  <linearGradient id="gLegR" x1="1" y1=".5" x2="0" y2=".5">
    <stop offset="0%"  stop-color="${dk(f,.12)}"/><stop offset="38%" stop-color="${lt(f,.14)}"/>
    <stop offset="100%" stop-color="${dk(f,.22)}"/>
  </linearGradient>
  <linearGradient id="gArm" x1="0" y1=".5" x2="1" y2=".5">
    <stop offset="0%"  stop-color="${dk(f,.18)}"/><stop offset="45%" stop-color="${lt(f,.10)}"/>
    <stop offset="100%" stop-color="${dk(f,.20)}"/>
  </linearGradient>`;
}

function buildFaceDefs(sk,ey){
  const f=sk.f,e=ey.f;
  return `
  <radialGradient id="gFace" cx="42%" cy="35%" r="62%">
    <stop offset="0%"  stop-color="${lt(f,.30)}"/>
    <stop offset="55%" stop-color="${f}"/>
    <stop offset="100%" stop-color="${dk(f,.18)}"/>
  </radialGradient>
  <radialGradient id="gEye" cx="38%" cy="32%" r="62%">
    <stop offset="0%"  stop-color="${lt(e,.55)}"/><stop offset="55%" stop-color="${e}"/>
    <stop offset="100%" stop-color="${dk(e,.40)}"/>
  </radialGradient>
  <clipPath id="ceL"><ellipse cx="114" cy="104" rx="16" ry="13"/></clipPath>
  <clipPath id="ceR"><ellipse cx="186" cy="104" rx="16" ry="13"/></clipPath>
  <filter id="blush"><feGaussianBlur stdDeviation="4"/></filter>`;
}

  return `

  <path d="M 112 294 C 108 360 110 430 115 495 C 118 528 120 550 121 562 L 133 562 C 134 550 133 528 131 495 C 128 430 128 360 126 294 Z" fill="url(#gLegL)"/>

  <path d="M 77 317 C 72 318 68 322 69 327 C 70 333 76 336 82 334 C 87 333 91 328 90 323 Z" fill="url(#gFace)"/>
  <path d="M 223 317 C 228 318 232 322 231 327 C 230 333 224 336 218 334 C 213 333 209 328 210 323 Z" fill="url(#gFace)"/>`;
}

function renderFace(ey,sk){
  const f=sk.f,s=sk.s,e=ey.f;
  return `
  <path d="M 84 106 C 80 100 80 115 84 118 C 88 120 94 116 94 110 C 94 104 90 100 86 102 Z" fill="url(#gFace)"/>
  <path d="M 216 106 C 220 100 220 115 216 118 C 212 120 206 116 206 110 C 206 104 210 100 214 102 Z" fill="url(#gFace)"/>
  <path d="M 86 104 C 84 108 84 114 86 116" stroke="${s}" stroke-width="1.2" fill="none" opacity=".45"/>
  <path d="M 214 104 C 216 108 216 114 214 116" stroke="${s}" stroke-width="1.2" fill="none" opacity=".45"/>
  <path d="M 150 32 C 194 32 218 62 220 92 C 222 118 218 142 210 156 C 202 168 180 174 162 175 C 156 176 150 176 150 176 C 150 176 144 176 138 175 C 120 174 98 168 90 156 C 82 142 78 118 80 92 C 82 62 106 32 150 32 Z" fill="url(#gFace)"/>
  <path d="M 90 152 C 98 170 120 175 138 176 M 210 152 C 202 170 180 175 162 176" stroke="${dk(f,.12)}" stroke-width="2" fill="none" opacity=".28"/>

  <line x1="141" y1="152" x2="140" y2="168" stroke="${dk(f,.20)}" stroke-width="1.8" opacity=".35"/>
  <line x1="159" y1="152" x2="160" y2="168" stroke="${dk(f,.20)}" stroke-width="1.8" opacity=".35"/>
  <ellipse cx="114" cy="98" rx="18" ry="9" fill="${lt(e,.4)}" opacity=".35"/>
  <ellipse cx="186" cy="98" rx="18" ry="9" fill="${lt(e,.4)}" opacity=".35"/>
  <ellipse cx="114" cy="104" rx="16" ry="13" fill="#f4f4ff"/>
  <ellipse cx="186" cy="104" rx="16" ry="13" fill="#f4f4ff"/>
  <circle  cx="114" cy="105" r="10" fill="url(#gEye)" clip-path="url(#ceL)"/>

  <circle  cx="114" cy="106" r="5"  fill="#0a0508"    clip-path="url(#ceL)"/>
  <circle  cx="186" cy="106" r="5"  fill="#0a0508"    clip-path="url(#ceR)"/>
  <circle  cx="111" cy="102" r="2.8" fill="white" opacity=".92" clip-path="url(#ceL)"/>
  <circle  cx="183" cy="102" r="2.8" fill="white" opacity=".92" clip-path="url(#ceR)"/>
  <circle  cx="119" cy="109" r="1.4" fill="white" opacity=".55" clip-path="url(#ceL)"/>

// ─── LAYER UPDATE ─────────────────────────────────────────
const BASE = 'layers/';

function applyLayout() {
  const map = {
    'l-hair-back':  LAYOUT.hairBack,
    'l-body-svg':   LAYOUT.body,
    'l-shoes':      LAYOUT.shoes,
    'l-outfit':     LAYOUT.outfit,
    'l-face-svg':   LAYOUT.head,
    'l-hair-front': LAYOUT.hairFront,
  };
  for (const [id, cfg] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (!el) continue;
    el.style.transformOrigin = cfg.origin;
    el.style.transform = `translate(${cfg.tx}px, ${cfg.ty}px) scale(${cfg.scale})`;
  }
}

// Apply CSS hair filter to both hair <img> layers
function applyHairFilter() {
  const f = HAIRS[st.hair].filter;
  document.getElementById('l-hair-back').style.filter  = f;
  document.getElementById('l-hair-front').style.filter = f;
}

// Load a PNG layer; show placeholder canvas if file not found
function loadPng(imgId, path, drawPlaceholder) {
  const el = document.getElementById(imgId);
  el.onerror = () => {
    el.src = drawPlaceholder();
    el.onerror = null;
  };
  el.src = path + '?v=1';
}

// ── Placeholder generators (canvas) ──
// These are shown until real PNGs exist in layers/
function placeholderHairBack(id) {
  const c=document.createElement('canvas'); c.width=300; c.height=620;
  const ctx=c.getContext('2d');
  // Only draw for long hairstyles (id ≤ 04 or 12/16)
  const longIds=['01','02','03','04','12','16'];
  const prefix=id.slice(0,2);
  if(longIds.includes(prefix)){
    ctx.fillStyle='rgba(140,140,140,0.85)';
    ctx.beginPath();
    ctx.roundRect(74,90,152,460,20);
    ctx.fill();
    // center part (will be covered by body/outfit)
    ctx.clearRect(105,160,90,320);
  }
  return c.toDataURL();
}

function placeholderHairFront(id) {
  const c=document.createElement('canvas'); c.width=300; c.height=620;
  const ctx=c.getContext('2d');
  if(id==='08-bald') return c.toDataURL(); // bald = empty
  ctx.fillStyle='rgba(140,140,140,0.90)';
  // Hair cap covering head
  ctx.beginPath();
  ctx.ellipse(150,85,68,70,0,0,Math.PI*2);
  ctx.fill();
  // Short styles: stop at ear level
  const longIds=['01','02','03','04','12','16'];
  const prefix=id.slice(0,2);
  if(longIds.includes(prefix)){
    // Side curtains
    ctx.beginPath();
    ctx.roundRect(74,100,30,200,10);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(196,100,30,200,10);
    ctx.fill();
  }
  return c.toDataURL();
}

function placeholderOutfit(id) {
  const c=document.createElement('canvas'); c.width=300; c.height=620;
  const ctx=c.getContext('2d');
  // Simple colored dress shape
  const colors={'01':'#b8e0f5','02':'#3a7d3e','03':'#2060c0','04':'#a8ccdc',
                '05':'#ff80ab','06':'#ff6fa3','07':'#f8e050','08':'#4caf50',
                '09':'#f8e840','10':'#9c27b0','11':'#ff3a8a','12':'#3d8bc7',
                '13':'#ff3a8a','14':'#bce4f5','15':'#ff80ab','16':'#1a1a1a',
                '17':'#f8f8f8','18':'#e8e8e8','19':'#f8f8f8','20':'#9c27b0',
                '21':'#f8e840','22':'#ff3a8a'};
  const col=colors[id.slice(0,2)]||'#cccccc';
  ctx.fillStyle=col;
  // Torso rectangle
  ctx.beginPath();
  ctx.roundRect(103,162,94,130,8);
  ctx.fill();
  // Skirt/pants triangle
  ctx.beginPath();
  ctx.moveTo(95,292); ctx.lineTo(205,292); ctx.lineTo(230,560); ctx.lineTo(70,560);
  ctx.closePath();
  ctx.fill();
  return c.toDataURL();
}

function placeholderShoes(id) {
  const c=document.createElement('canvas'); c.width=300; c.height=620;
  const ctx=c.getContext('2d');
  if(id==='00-barefoot') return c.toDataURL();
  const colors={'01':'#f8f8f8','02':'#c03030','03':'#ff90b8','04':'#ffd6e3',
                '05':'#8b4513','06':'#f0e040','07':'#8b4513','08':'#ffffff',
                '09':'#d32f2f','10':'#ff3a8a','11':'#f8e040','12':'#3d8bc7',
                '13':'#b8d8f0','14':'#1a1a1a','15':'#ff3a8a','16':'#a06a40'};
  const col=colors[id.slice(0,2)]||'#cccccc';
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.ellipse(122,568,28,13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(178,568,28,13,0,0,Math.PI*2); ctx.fill();
  return c.toDataURL();
}

// ─── MAIN RENDER ──────────────────────────────────────────
function render() {
  const sk=SKINS[st.skin], ey=EYES[st.eyes];
  const hs=HS[st.hs], ot=OT[st.ot], sh=SH[st.sh];

  // SVG body (layer 2 — behind outfit)
  document.getElementById('svg-defs').innerHTML      = buildBodyDefs(sk);
  document.getElementById('g-body').innerHTML        = renderBody(sk);
  // SVG face (layer 5 — above outfit, below hair-front)
  document.getElementById('svg-face-defs').innerHTML = buildFaceDefs(sk,ey);
  document.getElementById('g-face').innerHTML        = renderFace(ey,sk);

  // PNG layers (with canvas placeholder fallback)
  loadPng('l-hair-back',  `${BASE}hair-back/${hs.id}.png`,  ()=>'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
  loadPng('l-outfit',     `${BASE}outfit/${ot.id}.png`,     ()=>placeholderOutfit(ot.id));
  loadPng('l-shoes',      `${BASE}shoes/${sh.id}.png`,      ()=>placeholderShoes(sh.id));
  loadPng('l-hair-front', `${BASE}hair-front/${hs.id}.png`, ()=>placeholderHairFront(hs.id));

  applyHairFilter();
  applyLayout();

  // SVG accessories
  let acc='';
  if(hs.acc) acc+=hs.acc();
  if(ot.acc) acc+=ot.acc();
  document.getElementById('g-acc').innerHTML=acc;

  // Labels
  document.getElementById('n-hs').textContent=hs.name.toUpperCase();
  document.getElementById('n-ot').textContent=ot.name.toUpperCase();
  document.getElementById('n-sh').textContent=sh.name.toUpperCase();

  // Swatch active states
  document.querySelectorAll('#sw-skin .swatch').forEach((e,i)=>e.classList.toggle('on',i===st.skin));
  document.querySelectorAll('#sw-eye  .swatch').forEach((e,i)=>e.classList.toggle('on',i===st.eyes));
  document.querySelectorAll('#sw-hair .swatch').forEach((e,i)=>e.classList.toggle('on',i===st.hair));
}

// ─── SWATCHES ─────────────────────────────────────────────
function mkSw(id,pal,key){
  const c=document.getElementById(id); c.innerHTML='';
  pal.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='swatch'; d.style.background=p.f; d.title=p.n;
    d.onclick=()=>{st[key]=i;render();};
    c.appendChild(d);
  });
}

// ─── ARROWS ───────────────────────────────────────────────
const cycle=(key,L,dir)=>{st[key]=(st[key]+dir+L.length)%L.length;render();};
document.getElementById('hs-p').onclick=()=>cycle('hs',HS,-1);
document.getElementById('hs-n').onclick=()=>cycle('hs',HS,+1);
document.getElementById('ot-p').onclick=()=>cycle('ot',OT,-1);
document.getElementById('ot-n').onclick=()=>cycle('ot',OT,+1);
document.getElementById('sh-p').onclick=()=>cycle('sh',SH,-1);
document.getElementById('sh-n').onclick=()=>cycle('sh',SH,+1);

// ─── SAVE ─────────────────────────────────────────────────
document.getElementById('save').onclick=()=>{
  const wrap=document.getElementById('doll-wrap');
  const w=300,h=620;
  const cv=document.createElement('canvas'); cv.width=w*2; cv.height=h*2;
  const ctx=cv.getContext('2d');
  ctx.scale(2,2);
  ctx.fillStyle='#fff8f0'; ctx.fillRect(0,0,w,h);

  // Draw each layer in order
  const layers=[
    document.getElementById('l-hair-back'),
    null, // body SVG - drawn via foreignObject trick below
    document.getElementById('l-outfit'),
    document.getElementById('l-shoes'),
    document.getElementById('l-hair-front'),
  ];

  const bodySvg=document.getElementById('l-body-svg');
  const faceSvg=document.getElementById('l-face-svg');
  const accSvg=document.getElementById('l-acc-svg');

  function drawSvgToCanvas(svgEl,cb){
    const data=new XMLSerializer().serializeToString(svgEl);
    const img=new Image();
    img.onload=()=>{ctx.drawImage(img,0,0,w,h);cb();};
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(data);
  }

  function drawImgLayer(imgEl,filter,cb){
    if(!imgEl.src||imgEl.src===window.location.href){cb();return;}
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      ctx.save();
      if(filter){
        // Approximate filter via off-screen canvas (basic approach)
      }
      ctx.drawImage(img,0,0,w,h);
      ctx.restore();
      cb();
    };
    img.onerror=cb;
    img.src=imgEl.src;
  }

  // Sequential render pipeline
  drawImgLayer(document.getElementById('l-hair-back'),HAIRS[st.hair].filter,()=>{
    drawSvgToCanvas(bodySvg,()=>{
      drawImgLayer(document.getElementById('l-outfit'),null,()=>{
        drawImgLayer(document.getElementById('l-shoes'),null,()=>{
          drawSvgToCanvas(faceSvg,()=>{
          drawImgLayer(document.getElementById('l-hair-front'),HAIRS[st.hair].filter,()=>{
            drawSvgToCanvas(accSvg,()=>{
              cv.toBlob(b=>{
                const u=URL.createObjectURL(b);
                const a=document.createElement('a');
                a.href=u; a.download=`panenka-${Date.now()}.png`;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                setTimeout(()=>URL.revokeObjectURL(u),1000);
              },'image/png');
            });
          });
          });
        });
      });
    });
  });
};

// ─── FIT DOLL (responzivní škálování) ────────────────────
// Celý doll-canvas (300×620) se vejde do dostupného prostoru.
// doll-wrap dostane správnou logickou velikost pro flexbox centering.
function fitDoll() {
  const stage  = document.querySelector('.stage-inner');
  const availW = stage.clientWidth  - 12;
  const availH = stage.clientHeight - 12;
  const scale  = Math.min(availW / 300, availH / 620);
  const canvas = document.getElementById('doll-canvas');
  canvas.style.transform = `scale(${scale})`;
  const wrap = document.getElementById('doll-wrap');
  wrap.style.width  = Math.round(300 * scale) + 'px';
  wrap.style.height = Math.round(620 * scale) + 'px';
}
window.addEventListener('resize', fitDoll);

// ─── INIT ─────────────────────────────────────────────────
mkSw('sw-skin',SKINS,'skin');
mkSw('sw-eye', EYES, 'eyes');
mkSw('sw-hair',HAIRS,'hair');
render();
fitDoll();
</script>
