<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080818">
<title>Světelný souboj</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#080818;font-family:-apple-system,system-ui,sans-serif;color:#fff;touch-action:manipulation}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}

#btns{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;gap:10px;
  padding:10px 14px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  height:115px;z-index:10;
  background:linear-gradient(transparent,rgba(8,8,24,0.96));
}
.btn{
  flex:1;border:none;border-radius:18px;
  font-size:12px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;
  cursor:pointer;transition:transform .07s,filter .07s;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(0.89);filter:brightness(1.5)}
#b-red   {background:radial-gradient(ellipse at 50% 30%,#ff6677,#cc1122);color:#fff;text-shadow:0 0 8px rgba(255,255,255,.7);box-shadow:0 0 22px rgba(255,30,50,.6),inset 0 1px 0 rgba(255,255,255,.2)}
#b-yellow{background:radial-gradient(ellipse at 50% 30%,#ffee55,#ddaa00);color:#2a1000;box-shadow:0 0 22px rgba(255,200,0,.6),inset 0 1px 0 rgba(255,255,255,.3)}
#b-blue  {background:radial-gradient(ellipse at 50% 30%,#66aaff,#1144cc);color:#fff;text-shadow:0 0 8px rgba(255,255,255,.7);box-shadow:0 0 22px rgba(30,80,255,.6),inset 0 1px 0 rgba(255,255,255,.2)}

/* ── overlay ── */
#ov{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(4,4,20,.93);z-index:20;gap:12px;
}
#ov h1{font-size:34px;font-weight:900;color:#ffd93d;text-shadow:0 0 24px #ffaa00;text-align:center;line-height:1.1}
.ov-hint{font-size:13px;color:#888;text-align:center;line-height:1.6;max-width:270px}
.ov-hint b{color:#bbb}

/* difficulty buttons */
#diff-wrap{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;padding:0 20px}
.diff-btn{
  width:100%;padding:15px 20px;
  border:none;border-radius:16px;
  font-size:17px;font-weight:900;letter-spacing:.4px;
  cursor:pointer;transition:transform .08s,filter .08s;
  display:flex;align-items:center;gap:12px;
}
.diff-btn:active{transform:scale(0.95);filter:brightness(1.2)}
.diff-btn .dlabel{flex:1;text-align:left}
.diff-btn .ddesc{font-size:11px;font-weight:600;opacity:.7;text-align:right;line-height:1.3}
#d-easy  {background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#a8ff78;box-shadow:0 0 18px rgba(40,180,60,.3)}
#d-med   {background:linear-gradient(135deg,#e65100,#f57c00);color:#ffe0b2;box-shadow:0 0 18px rgba(240,120,0,.3)}
#d-hard  {background:linear-gradient(135deg,#4a0080,#7b00d4);color:#e0b0ff;box-shadow:0 0 18px rgba(160,40,255,.3)}

/* game-over score */
.ov-score{font-size:42px;font-weight:900;color:#ffd93d;text-shadow:0 0 20px #ffaa00}
.ov-sub  {font-size:15px;color:#888}
#retry-btn{
  padding:14px 44px;font-size:18px;font-weight:900;
  background:#ffd93d;color:#000;border:none;border-radius:14px;cursor:pointer;
  box-shadow:0 0 22px rgba(255,200,0,.4);margin-top:4px;
}
#retry-btn:active{transform:scale(0.95)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<a href="../" style="position:fixed;top:12px;left:14px;z-index:21;color:#555;font-size:12px;font-weight:800;text-decoration:none;letter-spacing:.04em">← HRY</a>

<div id="btns">
  <button class="btn" id="b-red"    onpointerdown="fire('red')"   >ČERVENÁ</button>
  <button class="btn" id="b-yellow" onpointerdown="fire('yellow')">ŽLUTÁ</button>
  <button class="btn" id="b-blue"   onpointerdown="fire('blue')"  >MODRÁ</button>
</div>

<div id="ov">
  <h1>⚡ SVĚTELNÝ<br>SOUBOJ</h1>
  <div class="ov-hint">Střílej paprsky správné barvy.<br>Smíchané barvy potřebují <b>2 zásahy</b>!</div>
  <div id="diff-wrap">
    <button class="diff-btn" id="d-easy" onclick="startGame('easy')">
      <span>😊</span>
      <span class="dlabel">LEHKÁ</span>
      <span class="ddesc">jen 3 barvy<br>čím dál rychleji</span>
    </button>
    <button class="diff-btn" id="d-med" onclick="startGame('medium')">
      <span>😐</span>
      <span class="dlabel">STŘEDNÍ</span>
      <span class="ddesc">+1 smíchaná barva<br>překvapení!</span>
    </button>
    <button class="diff-btn" id="d-hard" onclick="startGame('hard')">
      <span>😈</span>
      <span class="dlabel">TĚŽKÁ</span>
      <span class="ddesc">všechny 3 smíchané<br>postupně přibývají</span>
    </button>
  </div>
</div>

<script>
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const ov  = document.getElementById('ov');

// ── colour catalogue ───────────────────────────────────────────────────────
const C = {
  red:    {hex:'#ff3344', glow:'#ff1133', comp:null},
  blue:   {hex:'#3399ff', glow:'#1155ff', comp:null},
  yellow: {hex:'#ffdd00', glow:'#ffaa00', comp:null},
  orange: {hex:'#ff8800', glow:'#ff5500', comp:['red','yellow']},
  green:  {hex:'#33cc44', glow:'#00aa22', comp:['blue','yellow']},
  violet: {hex:'#cc44ff', glow:'#9900ee', comp:['red','blue']},
};

// ── layout ─────────────────────────────────────────────────────────────────
let W, H, PLAY_H, LANE_X, LANE_W;
const BTN_H  = 115;
const BEAM_H = 20;

function resize() {
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
  PLAY_H = H - BTN_H;
  LANE_W = Math.min(W * 0.66, 230);
  LANE_X = (W - LANE_W) / 2;
}
window.addEventListener('resize', resize);
resize();

// ── game state ─────────────────────────────────────────────────────────────
let enemies, shots, particles, popups, banner;
let lives, score, level, spawnT, lvlT, flashT;
let running = false, eid = 0;
let difficulty = 'easy';
let mediumExtra = null;   // the one random mixed colour for medium difficulty
const seenMixed = new Set();

// ── difficulty colour pools ────────────────────────────────────────────────
function getPool(lvl) {
  const base = ['red', 'blue', 'yellow'];
  if (difficulty === 'easy') return base;
  if (difficulty === 'medium') {
    // one extra mixed colour unlocks at level 4
    return (lvl >= 4 && mediumExtra) ? [...base, mediumExtra] : base;
  }
  // hard — all three mixed colours unlock progressively
  if (lvl <= 3) return base;
  if (lvl <= 5) return [...base, 'orange'];
  if (lvl <= 7) return [...base, 'orange', 'green'];
  return [...base, 'orange', 'green', 'violet'];
}

// ── difficulty speed/timing ────────────────────────────────────────────────
function lvlCfg(lvl) {
  const scales = { easy: {spd:13, ivl:0.16, imin:0.85}, medium: {spd:18, ivl:0.18, imin:0.60}, hard: {spd:23, ivl:0.21, imin:0.44} };
  const s = scales[difficulty];
  return {
    pool:     getPool(lvl),
    speed:    80 + lvl * s.spd,
    interval: Math.max(s.imin, 2.5 - lvl * s.ivl),
    maxE:     Math.min(1 + Math.floor(lvl / 1.6), 7),
  };
}

// ── spawn ──────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const c = lvlCfg(level);
  if (enemies.length >= c.maxE) return;
  if (enemies.some(e => e.y < 55)) return;

  const color = c.pool[Math.floor(Math.random() * c.pool.length)];
  enemies.push({ id: eid++, y: -BEAM_H * 2, color, spd: c.speed * (0.82 + Math.random() * 0.36) });

  if (C[color].comp && !seenMixed.has(color)) {
    seenMixed.add(color);
    showBanner(color);
  }
}

// ── fire ───────────────────────────────────────────────────────────────────
function fire(color) {
  if (!running) return;
  shots.push({ y: PLAY_H - BEAM_H - 4, color, spd: 500 });
}

// ── collision ──────────────────────────────────────────────────────────────
function collide() {
  outer:
  for (let p = shots.length - 1; p >= 0; p--) {
    const s = shots[p];
    for (let e = enemies.length - 1; e >= 0; e--) {
      const en = enemies[e];
      if (Math.abs(s.y - en.y) > BEAM_H * 2.5) continue;

      shots.splice(p, 1);
      if (s.color === en.color) {
        burst(LANE_X + LANE_W / 2, en.y, en.color, 14);
        score += 10 * level;
        addPopup(LANE_X + LANE_W / 2, en.y - 14, '+' + (10 * level), en.color);
        enemies.splice(e, 1);
      } else if (C[en.color].comp && C[en.color].comp.includes(s.color)) {
        burst(LANE_X + LANE_W / 2, en.y, s.color, 7);
        en.color = C[en.color].comp.find(x => x !== s.color);
      }
      continue outer;
    }
  }
}

// ── particles ──────────────────────────────────────────────────────────────
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.PI * 2 * i / n + Math.random() * 0.7;
    const v = 60 + Math.random() * 140;
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v,
      hex: C[color].hex, glow: C[color].glow,
      life: 1, dur: 0.35 + Math.random() * 0.3, r: 1.5 + Math.random() * 2 });
  }
}

function addPopup(x, y, text, color) {
  popups.push({ x, y, text, hex: C[color].hex, life: 1, dur: 0.75 });
}

// banner stores the mixed colour key so we can draw circles
function showBanner(mixedColor) {
  banner = { color: mixedColor, life: 1, dur: 3.2 };
}

// ── main loop ──────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const c = lvlCfg(level);
  spawnT -= dt;
  if (spawnT <= 0) { spawnEnemy(); spawnT = c.interval; }

  const lvlDur = difficulty === 'hard' ? 17 : 20;
  lvlT += dt;
  if (lvlT >= lvlDur) { level++; lvlT = 0; }

  flashT = Math.max(0, flashT - dt * 4);

  for (let i = enemies.length - 1; i >= 0; i--) {
    enemies[i].y += enemies[i].spd * dt;
    if (enemies[i].y > PLAY_H + BEAM_H * 2) {
      enemies.splice(i, 1);
      lives--;
      flashT = 1;
      if (lives <= 0) { endGame(); return; }
    }
  }

  for (let i = shots.length - 1; i >= 0; i--) {
    shots[i].y -= shots[i].spd * dt;
    if (shots[i].y < -BEAM_H * 2) shots.splice(i, 1);
  }

  collide();

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 180 * dt;
    p.life -= dt / p.dur;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 45 * dt; p.life -= dt / p.dur;
    if (p.life <= 0) popups.splice(i, 1);
  }

  if (banner) { banner.life -= dt / banner.dur; if (banner.life <= 0) banner = null; }

  draw();
  requestAnimationFrame(loop);
}

// ── draw helpers ───────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawBeam(cx, cy, widthRatio, color, alpha) {
  const w = LANE_W * widthRatio, h = BEAM_H * 2, info = C[color];
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = info.glow; ctx.shadowBlur = 22;
  const g = ctx.createLinearGradient(cx-w/2, 0, cx+w/2, 0);
  g.addColorStop(0,'transparent'); g.addColorStop(0.1,info.hex);
  g.addColorStop(0.5,'#ffffff');   g.addColorStop(0.9,info.hex);
  g.addColorStop(1,'transparent');
  ctx.fillStyle = g;
  roundRect(cx-w/2, cy-h/2, w, h, 7);
  ctx.fill();
  ctx.restore();
}

function dot(x, y, color, r) {
  ctx.save();
  ctx.shadowColor = C[color].glow; ctx.shadowBlur = 14;
  ctx.fillStyle = C[color].hex;
  // white ring
  ctx.beginPath(); ctx.arc(x, y, r+2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
  ctx.shadowBlur = 14;
  ctx.fillStyle = C[color].hex;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.arc(x-r*.28, y-r*.28, r*.38, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── main draw ──────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080818'; ctx.fillRect(0,0,W,H);

  if (flashT > 0) {
    ctx.fillStyle=`rgba(255,0,0,${flashT*.22})`; ctx.fillRect(0,0,W,H);
  }

  // lane
  const lg = ctx.createLinearGradient(LANE_X,0,LANE_X+LANE_W,0);
  lg.addColorStop(0,'rgba(70,70,200,0)'); lg.addColorStop(.5,'rgba(70,70,200,.055)'); lg.addColorStop(1,'rgba(70,70,200,0)');
  ctx.fillStyle=lg; ctx.fillRect(LANE_X,0,LANE_W,PLAY_H);
  ctx.strokeStyle='rgba(130,130,255,.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(LANE_X,0); ctx.lineTo(LANE_X,PLAY_H); ctx.moveTo(LANE_X+LANE_W,0); ctx.lineTo(LANE_X+LANE_W,PLAY_H); ctx.stroke();
  ctx.strokeStyle='rgba(70,70,180,.09)';
  for(let y=0;y<PLAY_H;y+=38){ctx.beginPath();ctx.moveTo(LANE_X,y);ctx.lineTo(LANE_X+LANE_W,y);ctx.stroke();}

  // player line
  ctx.save(); ctx.strokeStyle='rgba(180,210,255,.45)'; ctx.lineWidth=2;
  ctx.shadowColor='rgba(150,190,255,.8)'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(LANE_X,PLAY_H-10); ctx.lineTo(LANE_X+LANE_W,PLAY_H-10); ctx.stroke();
  ctx.restore();

  const cx = LANE_X + LANE_W/2;
  for (const e of enemies) drawBeam(cx, e.y, 0.84, e.color, 1.0);
  for (const s of shots)   drawBeam(cx, s.y, 0.55, s.color, 0.88);

  // particles
  ctx.save();
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life*p.life); ctx.fillStyle=p.hex; ctx.shadowColor=p.glow; ctx.shadowBlur=9;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // score popups
  ctx.save(); ctx.font='700 17px system-ui'; ctx.textAlign='center';
  for(const p of popups){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.hex; ctx.shadowColor=p.hex; ctx.shadowBlur=6;
    ctx.fillText(p.text,p.x,p.y);
  }
  ctx.restore();

  // new-colour banner — coloured circles only, no text colour names
  if (banner) {
    const alpha = Math.min(1, banner.life * 3);
    const [a, b] = C[banner.color].comp;
    const dotR   = 15;
    const by     = PLAY_H * 0.36;
    const bw     = 210, bh = 66;
    const bx     = (W - bw) / 2;

    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);

    // background pill
    ctx.fillStyle='rgba(8,8,24,0.90)';
    ctx.shadowColor=C[banner.color].glow; ctx.shadowBlur=22;
    roundRect(bx, by-bh/2, bw, bh, 16); ctx.fill();
    ctx.shadowBlur=0;

    // "✨ NOVÁ BARVA" label
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='600 11px system-ui'; ctx.textAlign='center';
    ctx.fillText('✨ NOVÁ BARVA', W/2, by-bh/2+16);

    // circles:  [mixed]  =  [comp1]  +  [comp2]
    const cy2   = by + 8;
    const eqX   = W/2 - 28;
    const plusX = W/2 + 14;
    dot(W/2 - 70, cy2, banner.color, dotR);

    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='700 20px system-ui'; ctx.textAlign='center';
    ctx.fillText('=', eqX, cy2+7);

    dot(W/2, cy2, a, dotR);

    ctx.fillText('+', plusX, cy2+7);

    dot(W/2 + 56, cy2, b, dotR);

    ctx.restore();
  }

  // HUD
  ctx.save();
  ctx.font='700 17px system-ui'; ctx.fillStyle='rgba(210,210,255,.85)';
  ctx.textAlign='left';  ctx.fillText('Skóre: '+score, 62, 28);
  ctx.textAlign='center'; ctx.fillStyle='rgba(160,160,220,.6)';
  ctx.fillText('Úroveň '+level, W/2, 28);
  ctx.textAlign='right'; ctx.font='18px system-ui';
  let h=''; for(let i=0;i<3;i++) h+=i<lives?'❤️':'🖤';
  ctx.fillText(h, W-10, 28);
  ctx.restore();
}

// ── game flow ──────────────────────────────────────────────────────────────
function startGame(diff) {
  difficulty  = diff;
  mediumExtra = diff === 'medium'
    ? ['orange','green','violet'][Math.floor(Math.random()*3)]
    : null;

  enemies=[]; shots=[]; particles=[]; popups=[]; banner=null;
  seenMixed.clear();
  lives=3; score=0; level=1; spawnT=0.4; lvlT=0; flashT=0;

  ov.style.display='none';
  running=true; lastTs=performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  running=false;
  const diffLabel = {easy:'😊 Lehká', medium:'😐 Střední', hard:'😈 Těžká'}[difficulty];
  ov.innerHTML=`
    <h1 style="color:#ff4455">KONEC HRY</h1>
    <div class="ov-score">${score}</div>
    <div class="ov-sub">Úroveň ${level} · ${diffLabel}</div>
    <button id="retry-btn" onclick="showMenu()">HRÁT ZNOVU</button>
  `;
  ov.style.display='flex';
}

function showMenu() {
  ov.innerHTML=`
    <h1>⚡ SVĚTELNÝ<br>SOUBOJ</h1>
    <div class="ov-hint">Střílej paprsky správné barvy.<br>Smíchané barvy potřebují <b>2 zásahy</b>!</div>
    <div id="diff-wrap">
      <button class="diff-btn" id="d-easy" onclick="startGame('easy')">
        <span>😊</span><span class="dlabel">LEHKÁ</span>
        <span class="ddesc">jen 3 barvy<br>čím dál rychleji</span>
      </button>
      <button class="diff-btn" id="d-med" onclick="startGame('medium')">
        <span>😐</span><span class="dlabel">STŘEDNÍ</span>
        <span class="ddesc">+1 smíchaná barva<br>překvapení!</span>
      </button>
      <button class="diff-btn" id="d-hard" onclick="startGame('hard')">
        <span>😈</span><span class="dlabel">TĚŽKÁ</span>
        <span class="ddesc">všechny 3 smíchané<br>postupně přibývají</span>
      </button>
    </div>
  `;
  ov.style.display='flex';
}
</script>
</body>
</html>
